# nginx interno del stack (contenedor). Sirve front+back en el mismo origen.
# Adaptado de deploy/nginx.conf: proxy_pass a los servicios de la red docker.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Cabeceras de seguridad básicas (sin TLS no aplica HSTS; una CSP estricta rompería los
    # chunks inline de Next — se deja fuera a propósito). OJO: nginx NO hereda add_header en
    # locations que definan el suyo (p.ej. el bloque SSE) — aceptado: son streams de datos,
    # no documentos renderizables.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # --- SSE (push servidor→cliente) ---
    location /api/v1/stream {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;            # imprescindible para SSE
        proxy_cache off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- WebSocket (comandos cliente→servidor) ---
    location /api/v1/ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # --- REST + health ---
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health {
        proxy_pass http://backend:8000;
    }

    # --- Frontend (Next.js `next start` en :3100) ---
    # :3100 y no :3000 — el :3000 lo bloquea una regla iptables de Easy Panel.
    location / {
        proxy_pass http://frontend:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
