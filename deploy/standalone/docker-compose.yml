# Stack aislado para kavasoft. Red propia, NO interfiere con Easy Panel/Swarm.
# Solo nginx publica un puerto al host (8090). backend/frontend quedan internos.
# Acceso: http://159.89.187.165:8090
#
# Build context = raiz del repo (../..), porque los Dockerfile copian backend/ y frontend/.
# Compose CANÓNICO del deploy (AD-3, PRD-011): volumen persistente + healthcheck como gate.

name: arbitraje-btc

services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    image: arbitraje-btc-backend
    environment:
      ARB_ENV: prod
      # Obligatorio (sin default vacío): este stack es público — sin token, el kill-switch,
      # la purga de BD y la config quedarían abiertos a Internet. El backend además se niega
      # a arrancar con ARB_ENV=prod y token vacío (ver backend/app/config.py).
      ARB_CONTROL_TOKEN: ${ARB_CONTROL_TOKEN:?define ARB_CONTROL_TOKEN (p.ej. openssl rand -hex 24)}
      # SQLite en el volumen (RF-001). CUATRO barras = ruta absoluta /data/arbitraje.db;
      # DB + sidecars -wal/-shm viven en /data, nunca en la capa escribible de /app.
      ARB_DB_URL: sqlite+aiosqlite:////data/arbitraje.db
      # Ventana de datos retenida (poda de fondo). Dimensiona el disco: horas × ~28 MB.
      # Default 24 h ≈ 0.7 GB; 528 h ≈ 15 GB. Ajustable desde .env sin tocar el compose.
      ARB_DB_RETENTION_HOURS: ${ARB_DB_RETENTION_HOURS:-24}
    volumes:
      - arb-data:/data
    expose:
      - "8000"
    # Gate de arranque (RF-005): parsea el BODY (status=="ok"), no solo HTTP 200 — /health
    # devuelve 200 también degradado. Sin curl/jq en la imagen: python stdlib.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json,sys,urllib.request;
          data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=5));
          sys.exit(0 if data.get('status')=='ok' else 1)
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    # Cap de logs (RNF): bajo overflow sostenido del writer el log crecería sin
    # límite y llenaría el disco del host. 3×50 MB por servicio, rotación local.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - arb-net

  frontend:
    build:
      context: ../..
      dockerfile: deploy/standalone/Dockerfile.frontend
      args:
        # Visor público read-only (PRD-010). Explícito además del default `1` del
        # Dockerfile: si alguien borra esta línea, el build sigue siendo read-only.
        NEXT_PUBLIC_READ_ONLY: "1"
    image: arbitraje-btc-frontend
    # Puerto y comando viven en el Dockerfile (RF-011): una sola autoridad del 3100.
    expose:
      - "3100"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"
    networks:
      - arb-net

  nginx:
    # Digest multi-arch resuelto el 2026-07-11 (RF-013).
    image: nginx:alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        # nginx no avanza hasta que /health reporte status=ok (RF-005).
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"
    networks:
      - arb-net

networks:
  arb-net:
    driver: bridge

volumes:
  # Persistencia SQLite (RF-001). PROHIBIDO `docker compose down -v` en runbooks:
  # borra este volumen y con él la sesión canónica.
  arb-data:
